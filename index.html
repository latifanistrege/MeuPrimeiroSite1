<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css"
    <title>Meu blog</title>
</head>
<body>
 <header>
    <h1>Meu blog</h1>
    <p>Lala</p>
    <p>Vou compartilhar com você sobre minha vida, sendo portadora da doença osteogêneses imperfeita, ossos de vidro </p>
 </header>
 <main>
    <h2>Meu primeiro post</h2>
    <p>Bem vindos ao meu blog, aqui você vai entender mais sobre como é a vida de uma pessoa com a doença apelidada de ossos de vidro</p>
    <img src="http://www.anoi.com.br/2018/12/integracao-escolar-na-osteogenese.html"
    alt="caracteristicas das pessoas com osteogêneses imperfeita">
    <button>💙 <span>0</span></buton>
 </main>   
</body>
<script>
   const botoes = document.querySelectorAll("button");
   botoes.forEach(function(botao){
      botao.addEventListener("click", botaoclicado);
      function botaoclicado(){
         let texto = botao.querySelector("span");
         texto.textContent++;
      }
   })
</script>
</html>
